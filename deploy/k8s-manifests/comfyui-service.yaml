apiVersion: v1
kind: Service
metadata:
  name: comfyui-service
  namespace: default
  labels:
    app: comfyui
  annotations:
    # Internal service for open-gallery backend communication
    prometheus.io/scrape: "true"
    prometheus.io/port: "8188"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP  # Internal service only, accessed by open-gallery
  selector:
    app: comfyui
  ports:
  - port: 8188
    targetPort: 8188
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours for long-running workflows

