apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-gallery
  namespace: default
  labels:
    app: open-gallery
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: open-gallery
  template:
    metadata:
      labels:
        app: open-gallery
        version: v1
    spec:
        # Service account for AWS IAM permissions (DynamoDB, S3, Bedrock)
        serviceAccountName: open-gallery-sa
        nodeSelector:
          workload: cpu
        containers:
        - name: open-gallery
          envFrom:
          - secretRef:
              name: open-gallery-secrets
          # Replace with your ECR image URL
          image: 008971666757.dkr.ecr.us-west-2.amazonaws.com/open-gallery:latest
          imagePullPolicy: Always
          ports:
          - containerPort: 57988
            name: http
            protocol: TCP
          resources:
            limits:
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
          # Health checks
          livenessProbe:
            httpGet:
              path: /
              port: 57988
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 57988
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Volume mounts
          volumeMounts:
          - name: user-data
            mountPath: /app/server/user_data
          - name: s3-files
            mountPath: /app/server/user_data/files
          # Environment variables
          env:
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: UI_DIST_DIR
            value: "/app/react/dist"
          - name: DEVELOPMENT_MODE
            value: "true"
          # ComfyUI endpoint - use internal ClusterIP service
          - name: COMFYUI_ENDPOINT
            value: "http://comfyui-service.default.svc.cluster.local:8188"

        # Volumes
        volumes:
        - name: user-data
          persistentVolumeClaim:
            claimName: open-gallery-user-data-pvc
        - name: s3-files
          persistentVolumeClaim:
            claimName: open-gallery-files-pvc
