apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-labeler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-labeler
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-labeler
subjects:
- kind: ServiceAccount
  name: node-labeler
  namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-labeler
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-labeler
  template:
    metadata:
      labels:
        app: node-labeler
    spec:
      serviceAccountName: node-labeler
      containers:
      - name: labeler
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          kubectl get nodes -o json | jq -r '.items[] | "\(.metadata.name) \(.metadata.labels."node.kubernetes.io/instance-type")"' | while read -r node type; do
            if echo "$type" | grep -qE 'ml\.g6e|ml\.g5|ml\.g4dn|g5\.|g6e\.|g4dn\.'; then
              kubectl label nodes "$node" workload=gpu --overwrite
            else
              kubectl label nodes "$node" workload=cpu --overwrite
            fi
          done

          kubectl get nodes --watch -o json | jq --unbuffered -r 'select(.object != null) | "\(.object.metadata.name) \(.object.metadata.labels."node.kubernetes.io/instance-type")"' | while read -r node type; do
            if echo "$type" | grep -qE 'ml\.g6e|ml\.g5|ml\.g4dn|g5\.|g6e\.|g4dn\.'; then
              kubectl label nodes "$node" workload=gpu --overwrite
            else
              kubectl label nodes "$node" workload=cpu --overwrite
            fi
          done
