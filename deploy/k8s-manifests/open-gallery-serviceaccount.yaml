---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: open-gallery-sa
  namespace: default
  labels:
    app: open-gallery
  annotations:
    # This ServiceAccount is used with EKS Pod Identity
    # to grant the open-gallery pods access to AWS services:
    # - DynamoDB (for database operations)
    # - S3 (for file storage)
    # - Bedrock (for LLM inference)

